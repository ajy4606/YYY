<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>회원가입</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; display: flex; justify-content: center; padding-top: 50px; }
        
        .signup-box { background: white; padding: 30px; border-radius: 8px; width: 350px; border: 1px solid #ddd; }
        
        h3 { margin-top: 0; text-align: center; color: #333; }
        
        .field { margin-bottom: 15px; }
        .field label { display: block; margin-bottom: 5px; font-size: 14px; font-weight: bold; }
        .field input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        
        .btn-group { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        button { padding: 10px; background: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background: #218838; }
        .cancel-link { text-align: center; font-size: 13px; color: #666; text-decoration: none; }
    </style>
</head>

<body>
<div class="signup-box">
    <h3>회원가입</h3>
    
    <form th:action="@{/signUp}" method="post">
        <div class="field">
            <label>이름</label>
            <input type="text" name="name" placeholder="이름" required>
        </div>
                
        <div class="field">
            <label>아이디</label>
            <input type="text" name="id" placeholder="아이디" required>
        </div>

        <div class="field">
            <label>이메일</label>
            <input type="email" name="email" placeholder="example@email.com" required>
        </div>

        <div class="field">
            <label>비밀번호</label>
            <input type="password" name="password" placeholder="비밀번호" required>
        </div>
        
        <div class="btn-group">
            <button type="submit">가입하기</button>
            <a th:href="@{/login}" class="cancel-link">이미 계정이 있으신가요? 로그인</a>
        </div>
    </form>
</div>
</body>
</html>

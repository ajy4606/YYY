<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>로그인</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .login-form { width: 100%; max-width: 400px; padding: 15px; background: white; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="login-form">
    <h2 class="text-center mb-4">로그인</h2>
    
    <div th:if="${param.error}" class="alert alert-danger">
        아이디 또는 비밀번호가 틀렸습니다.
    </div>

    <form th:action="@{/login}" method="post">
        <div class="mb-3">
            <label for="username" class="form-label">아이디</label>
            <input type="text" id="username" name="username" class="form-control" placeholder="아이디를 입력하세요" required>
        </div>
        <div class="mb-3">
            <label for="password" class="form-label">비밀번호</label>
            <input type="password" id="password" name="password" class="form-control" placeholder="비밀번호를 입력하세요" required>
        </div>
        <div class="d-grid gap-2">
            <button type="submit" class="btn btn-primary">로그인</button>
        </div>
    </form>
    
    <div class="mt-3 text-center">
        <a th:href="@{/signUp}" class="text-decoration-none">계정이 없으신가요? 회원가입</a>
    </div>
	<div class="d-grid gap-2 mt-2">
	    <a th:href="@{/members}" class="btn btn-link">회원목록 보기</a>
	</div>
</div>

</body>
</html>
